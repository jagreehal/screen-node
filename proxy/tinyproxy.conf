Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Info
PidFile "/tmp/tinyproxy.pid"
MaxClients 100

# Who may USE the proxy (the sandbox container, on the internal network).
Allow 0.0.0.0/0

# Default-deny egress. Only hosts matching /etc/tinyproxy/filter are reachable.
# The filter file is generated from the ALLOW env var at container start.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/filter"
FilterExtended On
FilterCaseSensitive Off

# HTTPS CONNECT is restricted to standard TLS ports (the worm exfiltrated over 443).
ConnectPort 443
ConnectPort 563
